suite: test admintools deployment
templates:
  - admintools-deployment.yaml
tests:
  - it: includes additional init containers
    set:
      admintools:
        additionalInitContainers:
          - name: my-init-container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: my-init-container
  - it: includes additional volumes
    set:
      admintools:
        additionalVolumes:
          - name: my-volume
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: my-volume
  - it: includes additional volume mounts
    set:
      admintools:
        additionalVolumeMounts:
          - name: my-volume
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: my-volume
  - it: minReadySeconds usage
    set:
      admintools:
        minReadySeconds: 10
    asserts:
      - equal:
          path: spec.minReadySeconds
          value: 10
  - it: TEMPORAL_ADDRESS uses admintools.temporalAddress when set
    set:
      admintools:
        temporalAddress: "my-temporal:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: "my-temporal:7233"
  - it: TEMPORAL_ADDRESS falls back to default when admintools.temporalAddress is not set
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: RELEASE-NAME-temporal-frontend:7233
  - it: TEMPORAL_ADDRESS falls back to default when admintools.temporalAddress is empty string
    set:
      admintools:
        temporalAddress: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: RELEASE-NAME-temporal-frontend:7233
  - it: uses global service account by default
    set:
      serviceAccount:
        create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-temporal
  - it: uses default service account when serviceAccount.create is false
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
  - it: uses per-service SA for admintools when configured
    set:
      serviceAccount:
        create: true
      admintools:
        serviceAccount:
          create: true
          name: my-admin-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-admin-sa
  - it: uses auto-generated name for admintools per-service SA
    set:
      admintools:
        serviceAccount:
          create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-temporal-admintools
  - it: falls back to global SA when admintools serviceAccount is empty
    set:
      serviceAccount:
        create: true
      admintools:
        serviceAccount: {}
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-temporal
  - it: uses externally managed SA for admintools
    set:
      admintools:
        serviceAccount:
          create: false
          name: external-admin-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: external-admin-sa