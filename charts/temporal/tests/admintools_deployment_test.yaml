suite: test admintools deployment
templates:
  - admintools-deployment.yaml
tests:
  - it: includes additional init containers
    set:
      admintools:
        additionalInitContainers:
          - name: my-init-container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: my-init-container
  - it: includes additional volumes
    set:
      admintools:
        additionalVolumes:
          - name: my-volume
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: my-volume
  - it: includes additional volume mounts
    set:
      admintools:
        additionalVolumeMounts:
          - name: my-volume
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: my-volume
  - it: minReadySeconds usage
    set:
      admintools:
        minReadySeconds: 10
    asserts:
      - equal:
          path: spec.minReadySeconds
          value: 10
  - it: TEMPORAL_ADDRESS uses admintools.temporalAddress when set
    set:
      admintools:
        temporalAddress: "my-temporal:7233"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: "my-temporal:7233"
  - it: TEMPORAL_ADDRESS falls back to default when admintools.temporalAddress is not set
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: RELEASE-NAME-temporal-frontend:7233
  - it: TEMPORAL_ADDRESS falls back to default when admintools.temporalAddress is empty string
    set:
      admintools:
        temporalAddress: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: RELEASE-NAME-temporal-frontend:7233
  - it: targets the internal-frontend by default when it is enabled
    set:
      server:
        internal-frontend:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: RELEASE-NAME-temporal-internal-frontend:7236
  - it: targets the external frontend when useExternalFrontend is set
    set:
      admintools:
        useExternalFrontend: true
      server:
        internal-frontend:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_ADDRESS
            value: RELEASE-NAME-temporal-frontend:7233
  - it: does not wire tls by default
    asserts:
      - notExists:
          path: spec.template.spec.volumes[?(@.name=='client-tls')]
      - notExists:
          path: spec.template.spec.containers[0].env[?(@.name=='TEMPORAL_TLS')]
  - it: wires frontend tls when the external frontend has tls
    set:
      server:
        tls:
          frontend:
            enabled: true
            secretName: my-frontend-secret
            serverName: temporal-frontend
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_TLS_SERVER_NAME
            value: temporal-frontend
      - equal:
          path: spec.template.spec.volumes[?(@.name=='client-tls')].secret.secretName
          value: my-frontend-secret
      # frontend requireClientAuth defaults to false, so no client cert is presented
      - notExists:
          path: spec.template.spec.containers[0].env[?(@.name=='TEMPORAL_TLS_CLIENT_CERT_PATH')]
  - it: wires internode tls when it targets the internal-frontend
    set:
      server:
        internal-frontend:
          enabled: true
        tls:
          internode:
            enabled: true
            secretName: my-internode-secret
            serverName: temporal-internode
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_TLS_SERVER_NAME
            value: temporal-internode
      # internode requireClientAuth defaults to true, so a client cert is presented
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEMPORAL_TLS_CLIENT_CERT_PATH
            value: /etc/temporal/tls/client/tls.crt
      - equal:
          path: spec.template.spec.volumes[?(@.name=='client-tls')].secret.secretName
          value: my-internode-secret
  - it: does not wire chart tls when a custom temporalAddress is set
    set:
      admintools:
        temporalAddress: "external-lb:7233"
      server:
        tls:
          frontend:
            enabled: true
            secretName: my-frontend-secret
            serverName: temporal-frontend
    asserts:
      - notExists:
          path: spec.template.spec.volumes[?(@.name=='client-tls')]
      - notExists:
          path: spec.template.spec.containers[0].env[?(@.name=='TEMPORAL_TLS')]
