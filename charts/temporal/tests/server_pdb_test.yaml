suite: test server pdb
templates:
  - server-pdb.yaml
set:
  server:
    enabled: true
    frontend:
      enabled: true
tests:
  - it: creates pdb when specified
    template: templates/server-pdb.yaml
    documentSelector:
      path: '$[?(@.metadata.name == "RELEASE-NAME-temporal-frontend-pdb")].kind'
      value: PodDisruptionBudget
      matchMany: true
    set:
      server:
        frontend:
          replicaCount: 1
          podDisruptionBudget:
            maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
  - it: creates pdb when relying on the global server replicaCount
    template: templates/server-pdb.yaml
    documentSelector:
      path: '$[?(@.metadata.name == "RELEASE-NAME-temporal-frontend-pdb")].kind'
      value: PodDisruptionBudget
      matchMany: true
    set:
      server:
        frontend:
          podDisruptionBudget:
            maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
  - it: renders multi-key pdb specs as valid YAML
    template: templates/server-pdb.yaml
    documentSelector:
      path: '$[?(@.metadata.name == "RELEASE-NAME-temporal-frontend-pdb")].kind'
      value: PodDisruptionBudget
      matchMany: true
    set:
      server:
        frontend:
          podDisruptionBudget:
            minAvailable: 1
            unhealthyPodEvictionPolicy: AlwaysAllow
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
  - it: doesn't create pdb when replica count is 0
    set:
      server:
        frontend:
          replicaCount: 0
          podDisruptionBudget:
            maxUnavailable: 1
    asserts:
      - containsDocument:
          kind: PodDisruptionBudget
          apiVersion: policy/v1
          name: RELEASE-NAME-temporal-frontend-pdb
        not: true
