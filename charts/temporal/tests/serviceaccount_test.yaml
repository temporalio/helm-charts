suite: test service accounts
templates:
  - serviceaccount.yaml
tests:
  - it: does not create any service account by default
    asserts:
      - hasDocuments:
          count: 0
  - it: creates global service account when serviceAccount.create is true
    set:
      serviceAccount:
        create: true
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-temporal
  - it: uses custom name for global service account
    set:
      serviceAccount:
        create: true
        name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa
  - it: adds extra annotations to global service account
    set:
      serviceAccount:
        create: true
        extraAnnotations:
          eks.amazonaws.com/role-arn: "arn:aws:iam::role/global"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::role/global"
  - it: creates per-service SA for frontend when configured
    set:
      serviceAccount:
        create: true
      server:
        frontend:
          serviceAccount:
            create: true
            name: my-frontend-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
        documentIndex: 1
      - equal:
          path: metadata.name
          value: my-frontend-sa
        documentIndex: 1
  - it: creates per-service SA for frontend with default name
    set:
      server:
        frontend:
          serviceAccount:
            create: true
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-temporal-frontend
  - it: adds extra annotations to per-service frontend SA
    set:
      server:
        frontend:
          serviceAccount:
            create: true
            extraAnnotations:
              eks.amazonaws.com/role-arn: "arn:aws:iam::role/frontend"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::role/frontend"
  - it: creates per-service SA for history when configured
    set:
      server:
        history:
          serviceAccount:
            create: true
            name: my-history-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: my-history-sa
  - it: creates per-service SA for matching when configured
    set:
      server:
        matching:
          serviceAccount:
            create: true
            name: my-matching-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: my-matching-sa
  - it: creates per-service SA for worker when configured
    set:
      server:
        worker:
          serviceAccount:
            create: true
            name: my-worker-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: my-worker-sa
  - it: creates per-service SA for admintools when configured
    set:
      admintools:
        serviceAccount:
          create: true
          name: my-admin-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: my-admin-sa
  - it: creates per-service SA for web when configured
    set:
      web:
        serviceAccount:
          create: true
          name: my-web-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: my-web-sa
  - it: creates per-service SA for schema when configured
    set:
      schema:
        serviceAccount:
          create: true
          name: my-schema-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: my-schema-sa
  - it: creates per-service SA for test when configured
    set:
      test:
        serviceAccount:
          create: true
          name: my-test-sa
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
      - equal:
          path: metadata.name
          value: my-test-sa
  - it: does not create per-service SA when serviceAccount is empty map
    set:
      serviceAccount:
        create: true
      server:
        frontend:
          serviceAccount: {}
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-temporal
  - it: creates global and multiple per-service SAs together
    set:
      serviceAccount:
        create: true
      server:
        frontend:
          serviceAccount:
            create: true
        history:
          serviceAccount:
            create: true
      admintools:
        serviceAccount:
          create: true
    asserts:
      - hasDocuments:
          count: 4
  - it: per-service SA has correct component label
    set:
      server:
        frontend:
          serviceAccount:
            create: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: frontend
  - it: per-service SA has helm hook annotations
    set:
      server:
        frontend:
          serviceAccount:
            create: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install, pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-10"