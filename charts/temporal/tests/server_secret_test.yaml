suite: test server secret
templates:
  - server-secret.yaml
tests:
  - it: creates a secret for the default store
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  password: "test1"
              visibility:
                sql:
                  password: "test2"
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-temporal-default-store
    asserts:
      - equal:
          path: data.password
          value: "dGVzdDE="
  - it: creates a secret for the visibility store
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  password: "test1"
              visibility:
                sql:
                  password: "test2"
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-temporal-visibility-store
    asserts:
      - equal:
          path: data.password
          value: "dGVzdDI="
  - it: creates a secret when the server job is enabled, even when server.enabled is false
    set:
      server:
        enabled: false
        config:
          persistence:
            datastores:
              default:
                sql:
                  password: "test"
              visibility:
                sql:
                  password: "test"
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
  - it: includes Helm hook annotations by default
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  password: "test"
              visibility:
                sql:
                  password: "test"
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-temporal-default-store
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-1"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation"
  - it: excludes Helm hook annotations when useHelmHooks is false
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  password: "test"
              visibility:
                sql:
                  password: "test"
      schema:
        useHelmHooks: false
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-temporal-default-store
    asserts:
      - isNull:
          path: metadata.annotations
  - it: merges Helm hook annotations with custom secretAnnotations
    set:
      server:
        secretAnnotations:
          custom-annotation: abc
        config:
          persistence:
            datastores:
              default:
                sql:
                  password: "test"
              visibility:
                sql:
                  password: "test"
      schema:
        useHelmHooks: true
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-temporal-default-store
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"
      - equal:
          path: metadata.annotations.custom-annotation
          value: abc
