suite: test server job
templates:
  - server-job.yaml
tests:
  - it: is able to create the server job even if Values.server.enabled is false
    set:
      server:
        enabled: false
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
    asserts:
      - containsDocument:
          kind: Job
          apiVersion: batch/v1
  - it: includes additional init containers
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      admintools:
        additionalInitContainers:
          - name: my-init-container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: my-init-container
  - it: includes additional environment variables
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  createDatabase: true
                  manageSchema: true
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  createDatabase: true
                  manageSchema: true
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      admintools:
        additionalEnv:
          - name: MY_ENV_VAR
            value: my-value
        additionalEnvSecretName: env-secret
        additionalEnvConfigMapName: env-configmap
    asserts:
      # create-*-store containers
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="create-default-store")].env[?(@.name=="MY_ENV_VAR")].value
          value: my-value
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="create-default-store")].envFrom[0].secretRef.name
          value: env-secret
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="create-default-store")].envFrom[1].configMapRef.name
          value: env-configmap
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="create-visibility-store")].env[?(@.name=="MY_ENV_VAR")].value
          value: my-value
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="create-visibility-store")].envFrom[0].secretRef.name
          value: env-secret
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="create-visibility-store")].envFrom[1].configMapRef.name
          value: env-configmap
      # manage-schema-*-store containers
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-default-store")].env[?(@.name=="MY_ENV_VAR")].value
          value: my-value
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-default-store")].envFrom[0].secretRef.name
          value: env-secret
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-default-store")].envFrom[1].configMapRef.name
          value: env-configmap
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="MY_ENV_VAR")].value
          value: my-value
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].envFrom[0].secretRef.name
          value: env-secret
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].envFrom[1].configMapRef.name
          value: env-configmap
  - it: includes additional volumes
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      admintools:
        additionalVolumes:
          - name: my-volume
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: my-volume
  - it: includes additional volume mounts
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      admintools:
        additionalVolumeMounts:
          - name: my-volume
    asserts:
      - equal:
          path: spec.template.spec.initContainers[*].volumeMounts[0].name
          value: my-volume
  - it: includes resource limits and requests on initContainers
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      schema:
        resources:
          requests:
            cpu: 12
            memory: 12Gi
          limits:
            cpu: 16
            memory: 16Gi
    asserts:
      - equal:
          path: spec.template.spec.initContainers[*].resources.requests.cpu
          value: 12
      - equal:
          path: spec.template.spec.initContainers[*].resources.requests.memory
          value: 12Gi
      - equal:
          path: spec.template.spec.initContainers[*].resources.limits.cpu
          value: 16
      - equal:
          path: spec.template.spec.initContainers[*].resources.limits.memory
          value: 16Gi
  - it: includes Helm hook annotations by default
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "0"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation"
  - it: excludes Helm hook annotations when useHelmHooks is false
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      schema:
        useHelmHooks: false
    asserts:
      - isNull:
          path: metadata.annotations
  - it: merges Helm hook annotations with custom jobAnnotations
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      schema:
        useHelmHooks: true
        jobAnnotations:
          custom-job-annotation: abc
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-install,pre-upgrade"
      - equal:
          path: metadata.annotations.custom-job-annotation
          value: abc
  - it: includes custom annotations and labels for pod and job
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      schema:
        useHelmHooks: false
        jobAnnotations:
          custom-job-annotation: abc
        podAnnotations:
          custom-pod-annotation: def
        podLabels:
          custom-pod-label: ghi
    asserts:
      - equal:
          path: metadata.annotations.custom-job-annotation
          value: abc
      - equal:
          path: spec.template.metadata.annotations.custom-pod-annotation
          value: def
      - equal:
          path: spec.template.metadata.labels.custom-pod-label
          value: ghi
  - it: sets backoffLimit and ttlSecondsAfterFinished on the job
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-visibility:3306"
                  databaseName: temporal_visibility
      schema:
        backoffLimit: 5
        ttlSecondsAfterFinished: 3600
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 5
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 3600
  - it: sets Elasticsearch TLS environment variables with all options
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  url:
                    scheme: https
                    host: "elasticsearch:9200"
                  username: ""
                  password: ""
                  indices:
                    visibility: temporal_visibility_v1
                  tls:
                    enabled: true
                    caFile: /etc/tls/ca.crt
                    certFile: /etc/tls/client.crt
                    keyFile: /etc/tls/client.key
                    serverName: elasticsearch.internal
                    enableHostVerification: false
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS")].value
          value: "true"
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_CA_FILE")].value
          value: /etc/tls/ca.crt
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_CERT_FILE")].value
          value: /etc/tls/client.crt
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_KEY_FILE")].value
          value: /etc/tls/client.key
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_SERVER_NAME")].value
          value: elasticsearch.internal
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_DISABLE_HOST_VERIFICATION")].value
          value: "true"
  - it: sets Elasticsearch TLS enabled without optional fields
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  url:
                    scheme: https
                    host: "elasticsearch:9200"
                  username: ""
                  password: ""
                  indices:
                    visibility: temporal_visibility_v1
                  tls:
                    enabled: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS")].value
          value: "true"
      - isNull:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_CA_FILE")]
      - isNull:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_CERT_FILE")]
      - isNull:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_KEY_FILE")]
      - isNull:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_SERVER_NAME")]
      - isNull:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_DISABLE_HOST_VERIFICATION")]
  - it: inverts enableHostVerification for Elasticsearch TLS
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  url:
                    scheme: https
                    host: "elasticsearch:9200"
                  username: ""
                  password: ""
                  indices:
                    visibility: temporal_visibility_v1
                  tls:
                    enabled: true
                    enableHostVerification: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="ES_TLS_DISABLE_HOST_VERIFICATION")].value
          value: "false"
  - it: sets Elasticsearch AWS request signing environment variables
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  url:
                    scheme: https
                    host: "elasticsearch:9200"
                  username: ""
                  password: ""
                  indices:
                    visibility: temporal_visibility_v1
                  aws-request-signing:
                    credentialProvider: environment
                    region: us-east-1
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_CREDENTIALS")].value
          value: environment
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_REGION")].value
          value: us-east-1
      - isNull:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_SESSION_TOKEN")]
  - it: sets AWS_SESSION_TOKEN for static Elasticsearch AWS credentials
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  url:
                    scheme: https
                    host: "elasticsearch:9200"
                  username: myAccessKeyID
                  password: mySecretAccessKey
                  indices:
                    visibility: temporal_visibility_v1
                  aws-request-signing:
                    credentialProvider: static
                    region: us-east-1
                    static:
                      token: mySessionToken
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_CREDENTIALS")].value
          value: static
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_REGION")].value
          value: us-east-1
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_SESSION_TOKEN")].value
          value: mySessionToken
  - it: omits AWS_SESSION_TOKEN when not using static Elasticsearch AWS credentials
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  url:
                    scheme: https
                    host: "elasticsearch:9200"
                  username: ""
                  password: ""
                  indices:
                    visibility: temporal_visibility_v1
                  aws-request-signing:
                    credentialProvider: aws-sdk-default
                    region: eu-west-1
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_CREDENTIALS")].value
          value: aws-sdk-default
      - isNull:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].env[?(@.name=="AWS_SESSION_TOKEN")]
  - it: extracts SQL_HOST and SQL_PORT from a single-host connectAddr
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: postgres12
                  connectAddr: "postgres-host:5432"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: postgres12
                  connectAddr: "postgres-host:5432"
                  databaseName: temporal_visibility
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-default-store")].env[?(@.name=="SQL_HOST")].value
          value: postgres-host
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-default-store")].env[?(@.name=="SQL_PORT")].value
          value: "5432"
  - it: extracts SQL_HOST and SQL_PORT from the first host in a multi-host connectAddr
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: postgres12
                  connectAddr: "host1:5432,host2:5432,host3:5432"
                  databaseName: temporal
              visibility:
                sql:
                  pluginName: postgres12
                  connectAddr: "host1:5432,host2:5432,host3:5432"
                  databaseName: temporal_visibility
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-default-store")].env[?(@.name=="SQL_HOST")].value
          value: host1
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-default-store")].env[?(@.name=="SQL_PORT")].value
          value: "5432"
  - it: skips setup-schema when skipClusterSettings is true for elasticsearch
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  skipClusterSettings: true
                  url:
                    scheme: http
                    host: "elasticsearch:9200"
                  username: ""
                  password: ""
                  indices:
                    visibility: temporal_visibility_v1
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].args[0]
          pattern: "^temporal-elasticsearch-tool create-index"
      - notMatchRegex:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].args[0]
          pattern: "setup-schema"
  - it: includes setup-schema by default for elasticsearch
    set:
      server:
        config:
          persistence:
            datastores:
              default:
                sql:
                  pluginName: mysql8
                  connectAddr: "temporal-persistence:3306"
                  databaseName: temporal
              visibility:
                elasticsearch:
                  version: v7
                  url:
                    scheme: http
                    host: "elasticsearch:9200"
                  username: ""
                  password: ""
                  indices:
                    visibility: temporal_visibility_v1
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[?(@.name=="manage-schema-visibility-store")].args[0]
          pattern: "setup-schema"
