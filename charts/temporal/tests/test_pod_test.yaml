suite: test pod
templates:
  - test.yaml
tests:
  - it: has helm test hook annotation by default
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
  - it: does not have custom annotations by default
    asserts:
      - notExists:
          path: metadata.annotations["sidecar.istio.io/inject"]
  - it: does not set resources by default
    asserts:
      - notExists:
          path: spec.containers[0].resources
  - it: sets resources when specified
    set:
      test:
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
    asserts:
      - equal:
          path: spec.containers[0].resources.limits.cpu
          value: 100m
      - equal:
          path: spec.containers[0].resources.requests.memory
          value: 128Mi
  - it: includes custom pod annotations when specified
    set:
      test:
        podAnnotations:
          sidecar.istio.io/inject: "false"
          custom-annotation: custom-value
    asserts:
      - equal:
          path: metadata.annotations["sidecar.istio.io/inject"]
          value: "false"
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: custom-value
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
  - it: does not set imagePullSecrets by default
    asserts:
      - notExists:
          path: spec.imagePullSecrets
  - it: sets imagePullSecrets when specified
    set:
      imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - equal:
          path: spec.imagePullSecrets[0].name
          value: my-registry-secret
