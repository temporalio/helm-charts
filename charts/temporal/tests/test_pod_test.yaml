suite: test pod
templates:
  - test.yaml
tests:
  - it: has helm test hook annotation by default
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
  - it: does not have custom annotations by default
    asserts:
      - notExists:
          path: metadata.annotations["sidecar.istio.io/inject"]
  - it: does not set resources by default
    asserts:
      - notExists:
          path: spec.containers[0].resources
  - it: sets resources when specified
    set:
      test:
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
    asserts:
      - equal:
          path: spec.containers[0].resources.limits.cpu
          value: 100m
      - equal:
          path: spec.containers[0].resources.requests.memory
          value: 128Mi
  - it: includes custom pod annotations when specified
    set:
      test:
        podAnnotations:
          sidecar.istio.io/inject: "false"
          custom-annotation: custom-value
    asserts:
      - equal:
          path: metadata.annotations["sidecar.istio.io/inject"]
          value: "false"
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: custom-value
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
  - it: does not set imagePullSecrets by default
    asserts:
      - notExists:
          path: spec.imagePullSecrets
  - it: sets imagePullSecrets when specified
    set:
      imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - equal:
          path: spec.imagePullSecrets[0].name
          value: my-registry-secret
  - it: does not set custom pod labels by default
    asserts:
      - notExists:
          path: metadata.labels.team
  - it: includes custom pod labels when specified
    set:
      test:
        podLabels:
          team: platform
          env: prod
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.labels.env
          value: prod
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: test
  - it: does not set nodeSelector by default
    asserts:
      - notExists:
          path: spec.nodeSelector
  - it: sets nodeSelector when specified
    set:
      test:
        nodeSelector:
          workload: temporal
    asserts:
      - equal:
          path: spec.nodeSelector.workload
          value: temporal
  - it: does not set tolerations by default
    asserts:
      - notExists:
          path: spec.tolerations
  - it: sets tolerations when specified
    set:
      test:
        tolerations:
          - key: dedicated
            operator: Equal
            value: temporal
            effect: NoSchedule
    asserts:
      - equal:
          path: spec.tolerations[0].key
          value: dedicated
      - equal:
          path: spec.tolerations[0].effect
          value: NoSchedule
  - it: does not set affinity by default
    asserts:
      - notExists:
          path: spec.affinity
  - it: sets affinity when specified
    set:
      test:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/arch
                      operator: In
                      values: [amd64]
    asserts:
      - equal:
          path: spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: kubernetes.io/arch
