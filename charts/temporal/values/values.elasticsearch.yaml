# This is an example of using an external Elasticsearch for Temporal visibility.
# Replace connection details with your Elasticsearch cluster information.

server:
  config:
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 512
      datastores:
        default:
          # Configure your default store (SQL or Cassandra)
          sql:
            pluginName: mysql8
            driverName: mysql8
            databaseName: temporal
            connectAddr: "mysql.example.com:3306"
            connectProtocol: "tcp"
            user: temporal
            password: password
        visibility:
          elasticsearch:
            version: v7
            url:
              scheme: http
              host: "elasticsearch-master-headless:9200"
            username: ""
            password: ""
            # for a production deployment use this instead of `password` and provision the secret beforehand
            # existingSecret: temporal-es-secret
            # secretKey: password
            logLevel: error
            indices:
              visibility: temporal_visibility_v1
            # Skip applying cluster-wide settings (action.auto_create_index) during schema setup.
            # Useful when sharing an ES cluster with other services that need auto-index creation.
            # skipClusterSettings: false
            # tls:
            #   enabled: true
            #   caFile: /path/to/ca.crt
            #   certFile: /path/to/client.crt
            #   keyFile: /path/to/client.key
            #   serverName: elasticsearch.internal
            #   enableHostVerification: true
            # aws-request-signing:
            #   credentialProvider: environment  # static, environment, or aws-sdk-default
            #   region: us-east-1
            #   static:
            #     accessKeyID: ""
            #     secretAccessKey: ""
            #     token: ""
