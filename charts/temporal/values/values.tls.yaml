# Example: TLS for the Temporal server and Web UI, with certificates issued by
# cert-manager (https://cert-manager.io).
#
# The chart does not template cert-manager resources: issuance is cluster- and
# CA-policy specific and cert-manager already models it well. Instead we create
# the Issuer/Certificate resources through `extraObjects` (rendered as-is), and
# each Certificate writes a kubernetes.io/tls secret. The `server.tls`/`web.tls`
# stanzas then mount those secrets and generate the matching config.tls and
# TEMPORAL_TLS_* env for us.
#
# Any other cert source works the same way: create the secret however you like
# (external-secrets, Vault, `kubectl create secret tls`, ...) and point the
# `secretName` fields at it. In that case you can drop the `extraObjects` block.
#
# Prerequisites:
#   * cert-manager is installed in the cluster.
#   * This example assumes the release is installed as `temporal`
#     (`helm install temporal ...`), so the frontend Service is
#     `temporal-frontend`. Adjust the names/serverName below to match your
#     release name if it differs.

extraObjects:
  # A self-signed CA to sign the Temporal certificates. Replace with your own
  # Issuer/ClusterIssuer (ACME, Vault, an existing CA, ...) as appropriate.
  - |
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: temporal-selfsigned
    spec:
      selfSigned: {}
  - |
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: temporal-ca
    spec:
      isCA: true
      commonName: temporal-ca
      secretName: temporal-ca-tls
      issuerRef:
        name: temporal-selfsigned
        kind: Issuer
  - |
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: temporal-ca
    spec:
      ca:
        secretName: temporal-ca-tls
  # Leaf certificate for internode (server-to-server) traffic. A single shared
  # SAN is verified by every peer, so all server pods present this cert.
  - |
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: temporal-internode-tls
    spec:
      secretName: temporal-internode-tls
      dnsNames:
        - temporal-internode
      # internode uses mutual TLS, so the cert must serve as both server and client.
      usages:
        - server auth
        - client auth
        - digital signature
        - key encipherment
      issuerRef:
        name: temporal-ca
        kind: Issuer
  # Leaf certificate for the frontend (and clients connecting to it).
  - |
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: temporal-frontend-tls
    spec:
      secretName: temporal-frontend-tls
      dnsNames:
        - temporal-frontend
      usages:
        - server auth
        - client auth
        - digital signature
        - key encipherment
      issuerRef:
        name: temporal-ca
        kind: Issuer

server:
  tls:
    internode:
      enabled: true
      secretName: temporal-internode-tls
      serverName: temporal-internode
    frontend:
      enabled: true
      secretName: temporal-frontend-tls
      # Set to true and issue client certs from the same CA to require mTLS.
      requireClientAuth: false
      serverName: temporal-frontend

web:
  tls:
    enabled: true
    secretName: temporal-frontend-tls
    serverName: temporal-frontend
    enableHostVerification: true
