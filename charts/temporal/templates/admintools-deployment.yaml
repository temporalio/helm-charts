{{- if $.Values.admintools.enabled }}
{{- /* By default the admin tools target the internal-frontend when it is enabled
(which grants admin without an external Authorizer); set
admintools.useExternalFrontend to true to route through the external frontend
instead. The two paths terminate TLS with different certificates, so resolve the
section accordingly. A custom admintools.temporalAddress points somewhere the
chart cannot reason about, so skip chart-managed TLS then and let the user wire
it via admintools.additionalEnv/additionalVolumes. */}}
{{- $useInternalFrontend := and (index $.Values.server "internal-frontend").enabled (not $.Values.admintools.useExternalFrontend) }}
{{- $tlsSection := "" }}
{{- if not $.Values.admintools.temporalAddress }}
{{- $tlsSection = include "temporal.adminClient.tls.section" (list $ $useInternalFrontend) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "temporal.componentname" (list $ "admintools") }}
  annotations:
    {{- include "temporal.resourceAnnotations" (list $ "admintools" "deployment") | nindent 4 }}
  labels:
    {{- include "temporal.resourceLabels" (list $ "admintools" "deployment") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "temporal.name" $ }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: admintools
  {{- with .Values.admintools.minReadySeconds }}
  minReadySeconds: {{ . }}
  {{- end }}
  template:
    metadata:
      annotations:
        {{- include "temporal.resourceAnnotations" (list $ "admintools" "pod") | nindent 8 }}
      labels:
        {{- include "temporal.resourceLabels" (list $ "admintools" "pod") | nindent 8 }}
    spec:
      {{ include "temporal.serviceAccount" $ }}
      {{- with $.Values.admintools.additionalInitContainers }}
      initContainers:
        {{- toYaml .| nindent 8 }}
      {{- end }}
      containers:
        - name: admin-tools
          image: "{{ .Values.admintools.image.repository }}:{{ .Values.admintools.image.tag }}"
          imagePullPolicy: {{ .Values.admintools.image.pullPolicy }}
          env:
            # TEMPORAL_CLI_ADDRESS is deprecated, use TEMPORAL_ADDRESS instead
            - name: TEMPORAL_CLI_ADDRESS
              {{- if $useInternalFrontend }}
              value: {{ include "temporal.internalFrontendAddress" $ }}
              {{- else }}
              value: {{ include "temporal.frontendAddress" $ }}
              {{- end }}
            - name: TEMPORAL_ADDRESS
              {{- if .Values.admintools.temporalAddress }}
              value: {{ .Values.admintools.temporalAddress }}
              {{- else if $useInternalFrontend }}
              value: {{ include "temporal.internalFrontendAddress" $ }}
              {{- else }}
              value: {{ include "temporal.frontendAddress" $ }}
              {{- end }}
          {{- if $tlsSection }}
          {{- include "temporal.adminClient.tls.env" (list $ $tlsSection) | nindent 12 }}
          {{- end }}
          {{- with .Values.admintools.additionalEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.admintools.additionalEnvSecretName .Values.admintools.additionalEnvConfigMapName }}
          envFrom:
          {{- with .Values.admintools.additionalEnvSecretName }}
            - secretRef:
                name: {{ . }}
          {{- end }}
          {{- with .Values.admintools.additionalEnvConfigMapName }}
            - configMapRef:
                name: {{ . }}
          {{- end }}
          {{- end }}
          livenessProbe:
              exec:
                command:
                - ls
                - /
              initialDelaySeconds: 5
              periodSeconds: 5
          {{- if or $.Values.admintools.additionalVolumeMounts $tlsSection }}
          volumeMounts:
          {{- with $.Values.admintools.additionalVolumeMounts }}
            {{- toYaml . | nindent 12}}
          {{- end }}
          {{- if $tlsSection }}
          {{- include "temporal.adminClient.tls.volumeMounts" (list $ $tlsSection) | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.admintools.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.admintools.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.admintools.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or $.Values.admintools.additionalVolumes $tlsSection }}
      volumes:
      {{- with $.Values.admintools.additionalVolumes }}
        {{- toYaml . | nindent 8}}
      {{- end }}
      {{- if $tlsSection }}
      {{- include "temporal.adminClient.tls.volumes" (list $ $tlsSection) | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.admintools.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.admintools.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.admintools.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}
