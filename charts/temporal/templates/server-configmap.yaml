{{- if .Values.server.enabled -}}
{{- $server := .Values.server -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ include "temporal.fullname" $ }}-config"
  labels:
    {{- include "temporal.resourceLabels" (list $ "" "") | nindent 4 }}
data:
  config_template.yaml: |-
    # enable-template
    log:
      {{- if (hasKey $server.config "logstdOut") }}
      stdout: {{ $server.config.logstdOut }}
      {{- else }}
      stdout: true
      {{- end }}
      level: {{ $server.config.logLevel | quote }}
      {{- with $server.config.logOutputFile }}
      outputFile: {{ . | quote }}
      {{- end }}
      {{- with $server.config.logFormat }}
      format: {{ . | quote }}
      {{- end }}

    persistence:
      {{- include "temporal.persistence.filterConfig" $server.config.persistence | nindent 6 }}

    global:
      membership:
        name: temporal
        maxJoinDuration: 30s
        broadcastAddress: {{ `{{ env "POD_IP" | quote }}` }}

      pprof:
        port: 7936

      metrics:
        tags:
          type: {{ `{{ env "TEMPORAL_SERVICES" | quote }}` }}
          {{- with $server.metrics.tags }}
            {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with $server.metrics.excludeTags }}
        excludeTags:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $server.metrics.prefix }}
        prefix: "{{- . }}"
        {{- end }}
        {{- with $server.config.prometheus }}
        prometheus:
          {{- toYaml . | nindent 10 }}
        {{- else }}
        prometheus:
          timerType: histogram
          listenAddress: "0.0.0.0:9090"
        {{- end }}

      {{- with $server.config.tls }}
      tls:
        {{- toYaml . | nindent 10 }}
      {{- end }}

      {{- with $server.config.authorization }}
      authorization:
        {{- toYaml . | nindent 10 }}
      {{- end }}

    services:
      frontend:
        rpc:
          grpcPort: {{ $server.frontend.service.port }}
          httpPort: {{ $server.frontend.service.httpPort }}
          membershipPort: {{ $server.frontend.service.membershipPort }}
          bindOnIP: "0.0.0.0"

      {{- with (index $.Values.server "internal-frontend") }}
      {{- if .enabled }}
      internal-frontend:
        rpc:
          grpcPort: {{ .service.port }}
          httpPort: {{ .service.httpPort }}
          membershipPort: {{ .service.membershipPort }}
          bindOnIP: "0.0.0.0"
      {{- end }}
      {{- end }}

      history:
        rpc:
          grpcPort: {{ $server.history.service.port }}
          membershipPort: {{ $server.history.service.membershipPort }}
          bindOnIP: "0.0.0.0"

      matching:
        rpc:
          grpcPort: {{ $server.matching.service.port }}
          membershipPort: {{ $server.matching.service.membershipPort }}
          bindOnIP: "0.0.0.0"

      worker:
        rpc:
          membershipPort: {{ $server.worker.service.membershipPort }}
          bindOnIP: "0.0.0.0"

    clusterMetadata:
    {{- with $server.config.clusterMetadata }}
      {{- toYaml . | nindent 8 }}
    {{- else }}
      enableGlobalNamespace: false
      failoverVersionIncrement: 10
      masterClusterName: "active"
      currentClusterName: "active"
      clusterInformation:
        active:
          enabled: true
          initialFailoverVersion: 1
          rpcName: "temporal-frontend"
          rpcAddress: "127.0.0.1:{{ $server.frontend.service.port }}"
          httpAddress: "127.0.0.1:{{ $server.frontend.service.httpPort }}"
    {{- end }}

    dcRedirectionPolicy:
    {{- with $server.config.dcRedirectionPolicy }}
      {{- toYaml . | nindent 8 }}
    {{- else }}
      policy: "noop"
      toDC: ""
    {{- end }}

    archival:
    {{- with $server.archival }}
      {{- toYaml . | nindent 6 }}
    {{- else }}
      status: "disabled"
    {{- end }}

    {{- with $server.namespaceDefaults }}
    namespaceDefaults:
      {{- toYaml . | nindent 6 }}
    {{- end }}

    {{- if not (index $.Values.server "internal-frontend").enabled }}
    publicClient:
      hostPort: "{{ include "temporal.componentname" (list $ "frontend") }}:{{ $server.frontend.service.port }}"
    {{- end }}

    dynamicConfigClient:
      filepath: "/etc/temporal/dynamic_config/dynamic_config.yaml"
      pollInterval: "10s"
{{- end }}
