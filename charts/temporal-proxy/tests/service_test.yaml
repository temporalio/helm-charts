suite: Service test
templates:
  - service.yaml
chart:
  version: 1.0.0
  appVersion: 1.0.0
release:
  name: temporal-proxy
  namespace: temporal-proxy
tests:
  - it: renders defaults
    asserts:
      - matchSnapshot: {}

  - it: defaults type and port
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: temporal-proxy
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8443
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].name
          value: http

  - it: renders custom values
    set:
      namespace: testing
      service:
        type: LoadBalancer
        port: 8080
    asserts:
      - equal:
          path: metadata.namespace
          value: testing
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: spec.ports[0].port
          value: 8080
