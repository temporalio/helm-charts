suite: PodDisruptionBudget test
templates:
  - pdb.yaml
chart:
  version: 1.0.0
  appVersion: 1.0.0
release:
  name: temporal-proxy
  namespace: temporal-proxy
tests:
  - it: skips manifest when podDisruptionBudget is unset
    asserts:
      - hasDocuments:
          count: 0

  - it: skips manifest when podDisruptionBudget is empty
    set:
      podDisruptionBudget: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: renders defaults
    set:
      podDisruptionBudget:
        minAvailable: 1
    asserts:
      - matchSnapshot: {}

  - it: renders with correct spec and selector
    set:
      namespace: testing
      podDisruptionBudget:
        minAvailable: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - isAPIVersion:
          of: policy/v1
      - equal:
          path: metadata.name
          value: temporal-proxy
      - equal:
          path: metadata.namespace
          value: testing
      - equal:
          path: spec.minAvailable
          value: 1
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: temporal-proxy
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: temporal-proxy

  - it: renders multi-key pdb specs as valid YAML
    set:
      podDisruptionBudget:
        maxUnavailable: 1
        unhealthyPodEvictionPolicy: AlwaysAllow
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
