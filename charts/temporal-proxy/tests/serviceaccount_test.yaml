suite: ServiceAccount test
templates:
  - serviceaccount.yaml
chart:
  version: 1.0.0
  appVersion: 1.0.0
release:
  name: temporal-proxy
  namespace: temporal-proxy
tests:
  - it: skips manifest when create is disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders defaults
    asserts:
      - matchSnapshot: {}

  - it: defaults the name to the fullname
    set:
      fullnameOverride: proxy-service
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: proxy-service
      - equal:
          path: automountServiceAccountToken
          value: true
      - notExists:
          path: metadata.annotations

  - it: renders custom values
    set:
      namespace: testing
      serviceAccount:
        create: true
        name: custom-sa
        automount: false
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/temporal-proxy
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
      - equal:
          path: metadata.namespace
          value: testing
      - equal:
          path: automountServiceAccountToken
          value: false
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/temporal-proxy
