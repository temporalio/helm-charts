suite: ConfigMap test
templates:
  - configmap.yaml
chart:
  version: 1.0.0
  appVersion: 1.0.0
release:
  name: temporal-proxy
  namespace: temporal-proxy
tests:
  - it: renders defaults
    asserts:
      - matchSnapshot: {}

  - it: renders default config
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: temporal-proxy
      - equal:
          path: metadata.namespace
          value: temporal-proxy
      - matchRegex:
          path: data["config.yaml"]
          pattern: "hostPort: :8443"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "default: default"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "name: default"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "hostPort: localhost:7233"

  - it: templates config against other values
    set:
      service:
        port: 9999
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "hostPort: :9999"

  - it: renders custom values
    set:
      namespace: testing
      config:
        hostPort: :7000
        upstreams:
          - name: primary
            hostPort: temporal.example.com:7233
        routing:
          default: primary
    asserts:
      - equal:
          path: metadata.namespace
          value: testing
      - matchRegex:
          path: data["config.yaml"]
          pattern: "hostPort: :7000"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "name: primary"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "hostPort: temporal.example.com:7233"
      - matchRegex:
          path: data["config.yaml"]
          pattern: "default: primary"
